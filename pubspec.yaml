name: mediashelf
description: "MediaShelf — Cross-platform Digital Asset Manager"
publish_to: 'none'
version: 0.2.2+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ────────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Navigation ──────────────────────────────────────────────────────────────
  go_router: ^14.8.1

  # ── Database ────────────────────────────────────────────────────────────────
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28
  sqlite3: ^2.9.4

  # ── File System ─────────────────────────────────────────────────────────────
  path_provider: ^2.1.5
  path: ^1.9.1
  file_picker: ^10.1.7
  watcher: ^1.1.1

  # ── Hashing & Identity ──────────────────────────────────────────────────────
  crypto: ^3.0.6
  uuid: ^4.5.1

  # ── Image / Thumbnail ───────────────────────────────────────────────────────
  image: ^4.2.0
  mime: ^1.0.6

  # ── Media Player ────────────────────────────────────────────────────────────
  media_kit: ^1.1.11
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4   # bundles libmpv + all codecs, no system deps needed

  # ── Viewer ──────────────────────────────────────────────────────────────────
  photo_view: ^0.15.0          # full-screen image zoom/pan
  pdfrx: ^1.0.0                # PDF rendering (Linux/Win/macOS/iOS/Android)
  flutter_markdown_plus: ^1.0.7 # Markdown + plain-text rendering (successor to flutter_markdown)
  url_launcher: ^6.3.1         # open unsupported files with the system default app

  # ── Grid / Virtual Scroll ───────────────────────────────────────────────────
  flutter_staggered_grid_view: ^0.7.0

  # ── Drag & Drop (Desktop) ───────────────────────────────────────────────────
  desktop_drop: ^0.4.4
  cross_file: ^0.3.4+2

  # ── UI Components ───────────────────────────────────────────────────────────
  gap: ^3.0.1
  intl: ^0.20.2
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1

  # ── Utilities ───────────────────────────────────────────────────────────────
  collection: ^1.19.1
  shared_preferences: ^2.3.5
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.2

flutter:
  uses-material-design: true
  generate: true
