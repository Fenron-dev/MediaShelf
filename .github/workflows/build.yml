name: Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-libav

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build linux --release

      - name: Package artifact
        run: |
          tar -czf mediashelf-linux-x64.tar.gz \
            -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: mediashelf-linux-x64
          path: mediashelf-linux-x64.tar.gz
          retention-days: 7

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build windows --release

      - name: Package artifact
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath mediashelf-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: mediashelf-windows-x64
          path: mediashelf-windows-x64.zip
          retention-days: 7

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build macos --release

      - name: Package artifact
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/mediashelf-macos.zip" mediashelf.app

      - uses: actions/upload-artifact@v4
        with:
          name: mediashelf-macos
          path: mediashelf-macos.zip
          retention-days: 7

  # ── Android ────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (debug — no signing required)
        run: flutter build apk --debug

      - name: Build AAB (release — unsigned)
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: mediashelf-android
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

  # ── iOS ────────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (no code sign)
        run: flutter build ios --release --no-codesign

      - name: Package artifact
        run: |
          cd build/ios/iphoneos
          zip -r "$GITHUB_WORKSPACE/mediashelf-ios-unsigned.zip" Runner.app

      - uses: actions/upload-artifact@v4
        with:
          name: mediashelf-ios-unsigned
          path: mediashelf-ios-unsigned.zip
          retention-days: 7

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos, build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Display structure
        run: find artifacts -type f

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "MediaShelf $TAG" \
            --generate-notes \
            artifacts/mediashelf-linux-x64/mediashelf-linux-x64.tar.gz \
            artifacts/mediashelf-windows-x64/mediashelf-windows-x64.zip \
            artifacts/mediashelf-macos/mediashelf-macos.zip \
            "artifacts/mediashelf-android/build/app/outputs/flutter-apk/app-debug.apk#mediashelf-android-debug.apk" \
            "artifacts/mediashelf-android/build/app/outputs/bundle/release/app-release.aab#mediashelf-android-release.aab" \
            artifacts/mediashelf-ios-unsigned/mediashelf-ios-unsigned.zip
